name: Generate Hitokoto Data and Sync to Cloudflare R2

on:
  workflow_dispatch:

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v6

      # 2. 安装 Python 环境
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      # 3. 依次运行 Python 脚本
      - name: Run Generate
        run: |
          echo "Clone hitokoto"
          git clone https://github.com/hitokoto-osc/sentences-bundle

          # 预创建 data 目录以防万一（如果脚本没自动创建）
          mkdir -p data

          echo "Running generate.ts..."
          python gen.py  
      
      # 4. 同步 data 目录到 Cloudflare R2
      - name: Sync to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET_NAME: hitokoto
        run: |
          # 同步 data 目录
          # aws s3 sync 默认递归处理子目录
          # --exclude "*" + --include "*.json" 确保只上传 JSON 文件
          # --content-type 强制设置为 JSON，方便浏览器预览

          aws s3 sync ./data s3://$R2_BUCKET_NAME \
            --endpoint-url $R2_ENDPOINT \
            --region auto \
            --no-progress \
            --exclude "*" \
            --include "*.json" \
            --content-type "application/json" \