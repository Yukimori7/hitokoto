name: Generate Hitokoto Data and Deploy to GitHub Pages

on:
  workflow_dispatch:

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. 拉取代码 (使用 v6)
      - name: Checkout code
        uses: actions/checkout@v6

      # 2. 安装 Deno 环境 (使用 v2，指定 Deno 2.x 版本)
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # 3. 依次运行 Deno 脚本
      - name: Run Generate
        run: |
          echo "Clone hitokoto"
          git clone https://github.com/hitokoto-osc/sentences-bundle

          # 预创建 data 目录以防万一（如果脚本没自动创建）
          mkdir -p data
          mkdir -p types

          echo "Running generate.ts..."
          deno run -A generate.ts

      # 4. 使用 GitHub Bot 账号提交修改
      - name: Commit changes as GitHub Bot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Update hitokoto" || exit 0
          git push
      
      # 5. 静态资源打包
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./

      # 5. 上传至 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
